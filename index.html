<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超級威龍 V2 AI - 終極免持完全體</title>
    <script src="https://cdn.cubing.net/js/cubing/twisty" type="module"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #f8fafc; --accent: #38bdf8; --border: #334155; }
        body.light-mode { --bg: #f8fafc; --panel: #ffffff; --text: #0f172a; --accent: #2563eb; --border: #cbd5e1; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        h2 { color: var(--accent); margin-bottom: 10px; text-shadow: 0 0 10px rgba(56,189,248,0.3); }
        
        .layout-container { display: flex; gap: 20px; width: 100%; max-width: 1100px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
        .panel { background: var(--panel); padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border: 1px solid var(--border); flex: 1; min-width: 340px; }
        
        button { padding: 12px 20px; font-weight: bold; background: #10b981; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; margin-bottom: 15px; box-shadow: 0 4px 0 #059669; transition: 0.1s; }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #059669; }
        
        #output { width: 100%; height: 100px; font-size: 28px; padding: 15px; background: rgba(0,0,0,0.2); color: var(--text); border: 2px solid var(--accent); border-radius: 8px; outline: none; resize: none; font-family: monospace; box-sizing: border-box; }
        .buffer-display { margin-top: 10px; font-size: 16px; color: #facc15; font-family: monospace; height: 24px; font-weight: bold; }
        
        .cube-wrapper { display: flex; justify-content: center; align-items: center; height: 220px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px; }
        twisty-player { width: 100%; height: 100%; }
        
        .sys-cmd-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; background: rgba(0,0,0,0.1); padding: 15px; border-radius: 8px; border: 1px dashed var(--border); }
        .sys-cmd-list span { color: #f43f5e; font-weight: bold; font-family: monospace; display: block; }
        
        #game-ui { display: none; text-align: center; margin-top: 15px; padding: 20px; background: rgba(244, 63, 94, 0.1); border: 2px solid #f43f5e; border-radius: 8px; }
        .target-word { font-size: 48px; letter-spacing: 6px; font-family: monospace; margin: 10px 0; color: #f43f5e; font-weight: bold; text-shadow: 0 0 10px rgba(244,63,94,0.4); }
        .game-stats { display: flex; justify-content: space-around; font-size: 24px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<h2>超級威龍 V2 AI - 終極免持完全體</h2>

<div class="layout-container">
    <div class="panel">
        <button onclick="connectCube()" id="btn-connect">🔗 1. 點此連線 (允許藍牙與音效)</button>
        <div id="status" style="color:#f43f5e; font-weight:bold; margin-bottom: 15px; text-align:center;">🔴 藍牙未連線 (請手動點擊)</div>
        
        <div class="cube-wrapper">
            <twisty-player id="cube3d" puzzle="3x3x3" control-panel="none" background="none"></twisty-player>
        </div>

        <div style="color:var(--accent); font-weight:bold; margin-bottom:8px;">🛠️ 系統控制手勢 (免滑鼠)：</div>
        <div class="sys-cmd-list">
            <div><span>F2 B2 U2 D2</span> 🗑️ 清空文字</div>
            <div><span>L2 R2 U2 D2</span> 🔠 大小寫切換</div>
            <div><span>U2 D2 R2 L2</span> 🌙 深淺色切換</div>
            <div><span>B2 F2 L2 R2</span> 🗣️ 語音唸出</div>
            <div><span>R2 L2 F2 B2</span> ⏱️ 開關生存戰</div>
            <div><span>U2 D2 F2 B2</span> ⏭️ 遊戲換字</div>
        </div>
    </div>

    <div class="panel">
        <textarea id="output" spellcheck="false" placeholder="魔術方塊就緒後，直接轉動即可打字..."></textarea>
        <div class="buffer-display" id="bufferDisplay">軌跡：等待中...</div>
        <div id="caps-status" style="color:#10b981; font-weight:bold; margin-top:5px; font-size:14px; display:none;">🔠 大寫鎖定已開啟</div>

        <div id="game-ui">
            <div style="color:#facc15; font-size: 18px;">🔥 60 秒極限生存戰 🔥</div>
            <div class="target-word" id="target-word">READY</div>
            <div class="game-stats">
                <div>⏳ <span id="game-time">60</span>s</div>
                <div>🏆 <span id="game-score">0</span></div>
            </div>
        </div>
    </div>
</div>

<script>
    const output = document.getElementById("output");
    const bufferDisplay = document.getElementById("bufferDisplay");
    const statusDiv = document.getElementById("status");
    const cube3d = document.getElementById("cube3d");
    
    let moveBuffer = [];
    let evalTimer = null;
    let isCaps = true;
    
    // 遊戲變數
    let inGame = false;
    let gameInterval = null;
    let timeLeft = 60;
    let score = 0;
    let currentTarget = "";
    const GAME_WORDS = ["CUBE", "SPEED", "MAC", "CODE", "PLL", "OLL", "RUBIK", "AI", "HTML", "JAVA", "TEST", "WIN", "PRO"];

    // 藍牙設定
    const SERVICE_UUID = '0000a0b0-0000-1000-8000-00805f9b34fb';
    const CHAR_UUID = '0000a0b1-0000-1000-8000-00805f9b34fb';
    const moveMap = { 1:"U", 2:"U'", 3:"U2", 4:"D", 5:"D'", 6:"D2", 7:"L", 8:"L'", 9:"L2", 10:"R", 11:"R'", 12:"R2", 13:"F", 14:"F'", 15:"F2", 16:"B", 17:"B'", 18:"B2" };

    // 音效系統
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if (type === 'type') { 
            osc.type = 'sine'; osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'cmd') { 
            osc.type = 'square'; osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'score') { 
            osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    // --- A-Z 完整公式庫 (排除內層旋轉) ---
    const DICTIONARY = {
        // 系統指令
        "F2 B2 U2 D2": "CMD_CLEAR",
        "R2 L2 F2 B2": "CMD_GAME",
        "L2 R2 U2 D2": "CMD_CAPS",
        "U2 D2 R2 L2": "CMD_THEME",
        "B2 F2 L2 R2": "CMD_SPEAK",
        "U2 D2 F2 B2": "CMD_SKIP",

        // 標點與控制
        "R U R' U'": ",", "R' F R F'": ".", "U R U' R'": "?", "F R' F' R": "!",
        "L' U' L U": "BACKSPACE", "U2": " ", "D2": "\n",

        // 數字 (簡單 OLL / F2L)
        "F R U R' U' F'": "1", "F U R U' R' F'": "2", "R U R' U R U2 R'": "3", "R U2 R' U' R U' R'": "4",
        "R U R' U R U' R' U R U2 R'": "5", "R2 D R' U2 R D' R' U2 R'": "6", "R U2 R2 U' R2 U' R2 U2 R": "7",
        "R U R' U' R' F R F'": "8", "R U' R'": "9", "R U R'": "0",

        // 字母 A-Z (全 PLL + 純外層變體 + 補位 OLL)
        "R' F R' B2 R F' R' B2 R2": "A", // Aa-Perm
        "R2 B2 R F R' B2 R F' R": "B",   // Ab-Perm
        "R U' R U R U R U' R' U' R2": "C", // Ua-Perm
        "R2 U R U R' U' R' U' R' U R'": "D", // Ub-Perm
        "R U' R' D R U R' D' R U R' D R U' R' D'": "E", // E-Perm
        "R' U' F' R U R' U' R' F R2 U' R' U'": "F", // F-Perm
        "R2 U R' U R' U' R U' R2 D U' R' U R D'": "G", // Ga-Perm
        "R2 U2 R U2 R2 U2 R2 U2 R U2 R2": "H", // H-Perm (純外層版)
        "R' U' R U D' R2 U R' U R U' R U' R2 D": "I", // Gb-Perm
        "R U R' F' R U R' U' R' F R2 U' R'": "J", // Jb-Perm
        "R' U L' U2 R U' R' U2 R L": "K", // Ja-Perm
        "R2 U' R U' R U R' U R2 D' U R U' R' D": "L", // Gc-Perm
        "R U R' U' D R2 U' R U' R' U R' U R2 D'": "M", // Gd-Perm
        "R U R' U R U R' F' R U R' U' R' F R2 U'": "N", // Na-Perm
        "R' U R U' R' F' U' F R U R' F R' F' R": "O", // Nb-Perm
        "R U' R' U' R U R D R' U' R D' R' U2 R'": "P", // Ra-Perm
        "R' U2 R U2 R' F R U R' U' R' F' R2 U'": "Q", // Rb-Perm
        "R U R' U' R' F R2 U' R' U' R U R' F'": "R", // T-Perm
        "F R U' R' U' R U R' F' R U R' U' R' F R F'": "S", // Y-Perm
        "R U R' U R' U' R' U R U' R' U' R2 U R": "T", // Z-Perm (純外層版)
        "R' U R' U' B' R' B2 U' R' U R' B R B": "U", // V-Perm
        "R' U' F U R U' R' F' R": "V", // L-OLL
        "R U R' U R U' R' U' R' F R F'": "W", // W-OLL
        "F R U R' U' F' U F R U R' U' F'": "X", // 兩次一字OLL
        "R U R2 U' R' F R U R U' F'": "Y", // C-OLL
        "F R U R' U' R U R' U' F'": "Z" // 兩次Sexy OLL
    };

    // 依照長度排序避免短公式誤判
    const sortedAlgos = Object.keys(DICTIONARY).sort((a, b) => b.length - a.length);

    async function connectCube() {
        try {
            audioCtx.resume();
            statusDiv.innerText = "🟡 連線中...";
            const device = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: 'MoYu' }], optionalServices: [SERVICE_UUID] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const char = await service.getCharacteristic(CHAR_UUID);
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', handleCubeData);
            
            statusDiv.innerText = "🟢 已連線！雙手可以離開滑鼠了";
            statusDiv.style.color = "#10b981";
            document.getElementById("btn-connect").style.display = "none";
            playSound('score');
        } catch (err) { statusDiv.innerText = "🔴 連線失敗"; }
    }

    function handleCubeData(e) {
        const val = new Uint8Array(e.target.value.buffer);
        const move = moveMap[val[18]];
        if (move) {
            moveBuffer.push(move);
            cube3d.alg = moveBuffer.join(" ");
            bufferDisplay.innerText = moveBuffer.join(" ");
            clearTimeout(evalTimer);
            evalTimer = setTimeout(evaluateBuffer, 650); // 判斷寬容度
        }
    }

    function cleanSequence(seqArray) {
        let str = seqArray.join(" ");
        let prev = "";
        while (str !== prev) {
            prev = str;
            str = str.replace(/([UDLRFB])\s\1'/g, "").replace(/([UDLRFB])'\s\1(?!')/g, "").replace(/\s+/g, " ").trim();
        }
        return str.length > 0 ? str.split(" ") : [];
    }

    function evaluateBuffer() {
        moveBuffer = cleanSequence(moveBuffer);
        let bufferStr = moveBuffer.join(" ");
        let typed = false;

        for (let algo of sortedAlgos) {
            while (bufferStr.includes(algo)) {
                executeAction(DICTIONARY[algo]);
                bufferStr = bufferStr.replace(algo, "").trim().replace(/\s+/g, " ");
                typed = true;
            }
        }

        if (typed) {
            moveBuffer = bufferStr.length > 0 ? bufferStr.split(" ") : [];
            bufferDisplay.innerText = moveBuffer.length ? moveBuffer.join(" ") : "就緒";
            setTimeout(() => { if(moveBuffer.length === 0) cube3d.alg = ""; }, 400);
        } else if (moveBuffer.length > 30) {
            moveBuffer = []; bufferDisplay.innerText = "已清除無效軌跡"; cube3d.alg = "";
        }
    }

    function executeAction(action) {
        if (action.startsWith("CMD_")) {
            playSound('cmd');
            if (action === "CMD_CLEAR") { output.value = ""; }
            else if (action === "CMD_CAPS") { 
                isCaps = !isCaps; 
                document.getElementById("caps-status").style.display = isCaps ? "block" : "none"; 
            }
            else if (action === "CMD_THEME") { document.body.classList.toggle("light-mode"); }
            else if (action === "CMD_GAME") { toggleGame(); }
            else if (action === "CMD_SKIP" && inGame) { nextWord(); }
            else if (action === "CMD_SPEAK") { 
                const utterance = new SpeechSynthesisUtterance(output.value || "沒有文字");
                utterance.lang = 'zh-TW';
                window.speechSynthesis.speak(utterance);
            }
            return;
        }

        // 處理一般打字
        playSound('type');
        let charToType = action;
        if (action === "BACKSPACE") { 
            output.value = output.value.slice(0, -1); 
        } else {
            if (charToType.length === 1 && charToType.match(/[A-Z]/i)) {
                charToType = isCaps ? charToType.toUpperCase() : charToType.toLowerCase();
            }
            output.value += charToType;
        }
        
        output.scrollTop = output.scrollHeight;

        // 遊戲判定
        if (inGame) {
            let currentText = output.value.trim().toUpperCase();
            if (currentText.endsWith(currentTarget)) {
                playSound('score');
                score += 10;
                document.getElementById("game-score").innerText = score;
                output.value = ""; // 打對就清空，準備下一個字
                nextWord();
            }
        }
    }

    // --- 遊戲邏輯 ---
    function toggleGame() {
        inGame = !inGame;
        const ui = document.getElementById("game-ui");
        if (inGame) {
            ui.style.display = "block";
            score = 0; timeLeft = 60;
            document.getElementById("game-score").innerText = score;
            document.getElementById("game-time").innerText = timeLeft;
            output.value = "";
            nextWord();
            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById("game-time").innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(gameInterval);
                    inGame = false;
                    ui.style.display = "none";
                    const endMsg = new SpeechSynthesisUtterance(`時間到！你的分數是 ${score} 分`);
                    endMsg.lang = 'zh-TW';
                    window.speechSynthesis.speak(endMsg);
                    output.value = `[遊戲結束] 得分: ${score}\n`;
                }
            }, 1000);
        } else {
            ui.style.display = "none";
            clearInterval(gameInterval);
        }
    }

    function nextWord() {
        currentTarget = GAME_WORDS[Math.floor(Math.random() * GAME_WORDS.length)];
        document.getElementById("target-word").innerText = currentTarget;
    }
</script>
</body>
</html>
