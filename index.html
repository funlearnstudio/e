<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超級威龍 V2 AI - 視覺化終極版</title>
    <script src="https://cdn.cubing.net/js/cubing/twisty" type="module"></script>
    <style>
        :root { --bg: #050505; --panel: #111; --text: #0f0; --accent: #0f0; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: monospace; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        h2 { color: var(--accent); margin-bottom: 10px; text-shadow: 0 0 10px var(--accent); }
        
        .layout-container { display: flex; gap: 15px; width: 100%; max-width: 1400px; flex-wrap: wrap; justify-content: center; align-items: stretch; }
        .panel { background: var(--panel); padding: 15px; border-radius: 8px; border: 1px solid var(--border); flex: 1; min-width: 300px; display: flex; flex-direction: column; }
        .panel-large { flex: 2; min-width: 400px; }
        
        button { padding: 10px; font-weight: bold; background: #222; color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; cursor: pointer; font-size: 14px; width: 100%; margin-bottom: 15px; font-family: monospace; }
        button:hover { background: var(--accent); color: #000; }
        
        #output { width: 100%; height: 180px; font-size: 24px; padding: 15px; background: #000; color: var(--accent); border: 1px solid var(--border); border-radius: 4px; outline: none; resize: none; font-family: monospace; box-sizing: border-box; }
        .buffer-display { margin-top: 10px; font-size: 16px; color: #ff0; height: 24px; font-weight: bold; }
        
        .cube-wrapper { display: flex; justify-content: center; align-items: center; height: 200px; background: #000; border: 1px solid var(--border); margin-bottom: 15px; }
        twisty-player { width: 100%; height: 100%; }
        
        /* 指令表面板設計 */
        .dictionary-panel { background: #000; border: 1px solid var(--border); padding: 10px; overflow-y: auto; height: 400px; font-size: 13px; }
        .dict-section-title { color: #f0f; border-bottom: 1px dashed #f0f; margin-top: 10px; margin-bottom: 5px; padding-bottom: 3px; font-weight: bold; }
        .dict-item { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 4px 0; }
        .dict-key { color: #fff; font-weight: bold; width: 60px; }
        .dict-val { color: #aaa; text-align: right; }
    </style>
</head>
<body>

<h2>[超級威龍 V2 AI - 視覺化終極面板]</h2>

<div class="layout-container">
    <div class="panel">
        <button onclick="connectCube()" id="btn-connect">>>> 初始化藍牙連線</button>
        <div id="status" style="color:#f00; font-weight:bold; margin-bottom: 10px; text-align:center;">[系統離線] 等待連線...</div>
        <div class="cube-wrapper"><twisty-player id="cube3d" puzzle="3x3x3" control-panel="none" background="none"></twisty-player></div>
        <div style="font-size: 12px; color: #aaa;">提示：若無法連線藍牙，可直接滑鼠拖曳上方魔方進行測試。</div>
    </div>

    <div class="panel panel-large">
        <textarea id="output" spellcheck="false" placeholder="終端機就緒。請參閱右側指令表輸入訊號..."></textarea>
        <div class="buffer-display" id="bufferDisplay">當前軌跡：等待中...</div>
        <div style="display:flex; justify-content:space-between; margin-top: 10px; color: #0ff; font-weight: bold;">
            <span id="ind-caps">CAPS: ON</span>
            <span id="ind-music">MUSIC: OFF</span>
        </div>
    </div>

    <div class="panel">
        <div style="color:var(--accent); font-weight:bold; margin-bottom:10px;">📋 系統指令對照表</div>
        <div class="dictionary-panel" id="dict-display">
            </div>
    </div>
</div>

<script>
    const output = document.getElementById("output");
    const bufferDisplay = document.getElementById("bufferDisplay");
    const statusDiv = document.getElementById("status");
    const cube3d = document.getElementById("cube3d");
    const dictDisplay = document.getElementById("dict-display");
    
    let moveBuffer = [];
    let evalTimer = null;
    let isCaps = true;
    let isMusicMode = false;
    
    // 藍牙 UUID
    const SERVICE_UUID = '0000a0b0-0000-1000-8000-00805f9b34fb';
    const CHAR_UUID = '0000a0b1-0000-1000-8000-00805f9b34fb';
    const moveMap = { 1:"U", 2:"U'", 3:"U2", 4:"D", 5:"D'", 6:"D2", 7:"L", 8:"L'", 9:"L2", 10:"R", 11:"R'", 12:"R2", 13:"F", 14:"F'", 15:"F2", 16:"B", 17:"B'", 18:"B2" };

    // 音效合成器
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = { 'U': 261.63, 'D': 293.66, 'L': 329.63, 'R': 349.23, 'F': 392.00, 'B': 440.00 }; 

    function playSound(type, face = null) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'type') { 
            osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        } else if (type === 'music' && face) {
            osc.type = 'sine'; osc.frequency.setValueAtTime(notes[face[0]], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    // --- 完整系統字典 ---
    const DICTIONARY = {
        // 系統控制
        "F2 B2 U2 D2": "清除畫面 (CLEAR)", "L2 R2 U2 D2": "大小寫切換 (CAPS)", 
        "L2 B2 L2 B2": "電子琴模式 (MUSIC)", "B2 F2 L2 R2": "語音朗讀 (SPEAK)",
        // 標點與控制鍵
        "U2": "[空白鍵]", "L' U' L U": "[倒退鍵 (Back)]", "R U R' U'": ",", "R' F R F'": ".",
        // 完整 A-Z
        "R' F R' B2 R F' R' B2 R2": "A", "R2 B2 R F R' B2 R F' R": "B", "R U' R U R U R U' R' U' R2": "C",
        "R2 U R U R' U' R' U' R' U R'": "D", "R U' R' D R U R' D' R U R' D R U' R' D'": "E",
        "R' U' F' R U R' U' R' F R2 U' R' U'": "F", "R2 U R' U R' U' R U' R2 D U' R' U R D'": "G",
        "R2 U2 R U2 R2 U2 R2 U2 R U2 R2": "H", "R' U' R U D' R2 U R' U R U' R U' R2 D": "I",
        "R U R' F' R U R' U' R' F R2 U' R'": "J", "R' U L' U2 R U' R' U2 R L": "K",
        "R2 U' R U' R U R' U R2 D' U R U' R' D": "L", "R U R' U' D R2 U' R U' R' U R' U R2 D'": "M",
        "R U R' U R U R' F' R U R' U' R' F R2 U'": "N", "R' U R U' R' F' U' F R U R' F R' F' R": "O",
        "R U' R' U' R U R D R' U' R D' R' U2 R'": "P", "R' U2 R U2 R' F R U R' U' R' F' R2 U'": "Q",
        "R U R' U' R' F R2 U' R' U' R U R' F'": "R", "F R U' R' U' R U R' F' R U R' U' R' F R F'": "S",
        "R U R' U R' U' R' U R U' R' U' R2 U R": "T", "R' U R' U' B' R' B2 U' R' U R' B R B": "U",
        "R' U' F U R U' R' F' R": "V", "R U R' U R U' R' U' R' F R F'": "W",
        "F R U R' U' F' U F R U R' U' F'": "X", "R U R2 U' R' F R U R U' F'": "Y", "F R U R' U' R U R' U' F'": "Z"
    };

    // 依照長度排序避免短公式誤判
    const sortedAlgos = Object.keys(DICTIONARY).sort((a, b) => b.length - a.length);

    // --- 自動生成右側的 UI 指令表 ---
    function renderDictionary() {
        let html = '<div class="dict-section-title">🔧 系統控制與標點</div>';
        for (let [moves, char] of Object.entries(DICTIONARY)) {
            if (char.length > 1) { // 標記為指令或標點
                html += `<div class="dict-item"><span class="dict-key">${char}</span><span class="dict-val">${moves}</span></div>`;
            }
        }
        html += '<div class="dict-section-title">🔠 字母 A-Z </div>';
        for (let [moves, char] of Object.entries(DICTIONARY)) {
            if (char.length === 1 && char.match(/[A-Z]/i)) {
                html += `<div class="dict-item"><span class="dict-key">${char}</span><span class="dict-val">${moves}</span></div>`;
            }
        }
        dictDisplay.innerHTML = html;
    }
    renderDictionary(); // 網頁載入時立刻繪製

    async function connectCube() {
        try {
            audioCtx.resume();
            statusDiv.innerText = "[通訊建立中...]";
            // 替換成這行（解開限制）：
            const device = await navigator.bluetooth.requestDevice({ acceptAllDevices: true, optionalServices: [SERVICE_UUID] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const char = await service.getCharacteristic(CHAR_UUID);
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', handleCubeData);
            
            statusDiv.innerText = "[連線成功] 實體控制權移交。";
            statusDiv.style.color = "#0f0";
            document.getElementById("btn-connect").style.display = "none";
        } catch (err) { 
    statusDiv.innerText = "[錯誤細節] " + err.name + ": " + err.message; 
    console.error(err);
}

    function handleCubeData(e) {
        const val = new Uint8Array(e.target.value.buffer);
        const move = moveMap[val[18]];
        if (move) {
            if (isMusicMode) playSound('music', move);
            moveBuffer.push(move);
            cube3d.alg = moveBuffer.join(" ");
            bufferDisplay.innerText = ">> " + moveBuffer.join(" ");
            clearTimeout(evalTimer);
            evalTimer = setTimeout(evaluateBuffer, 700);
        }
    }

    function cleanSequence(seqArray) {
        let str = seqArray.join(" ");
        let prev = "";
        while (str !== prev) {
            prev = str;
            str = str.replace(/([UDLRFB])\s\1'/g, "").replace(/([UDLRFB])'\s\1(?!')/g, "").replace(/\s+/g, " ").trim();
        }
        return str.length > 0 ? str.split(" ") : [];
    }

    function evaluateBuffer() {
        moveBuffer = cleanSequence(moveBuffer);
        let bufferStr = moveBuffer.join(" ");
        let typed = false;

        for (let algo of sortedAlgos) {
            while (bufferStr.includes(algo)) {
                executeAction(DICTIONARY[algo]);
                bufferStr = bufferStr.replace(algo, "").trim().replace(/\s+/g, " ");
                typed = true;
            }
        }

        if (typed) {
            moveBuffer = bufferStr.length > 0 ? bufferStr.split(" ") : [];
            bufferDisplay.innerText = moveBuffer.length ? ">> " + moveBuffer.join(" ") : ">> [待命中]";
            setTimeout(() => { if(moveBuffer.length === 0) cube3d.alg = ""; }, 400);
        } else if (moveBuffer.length > 25) {
            moveBuffer = []; bufferDisplay.innerText = ">> [緩衝區溢位] 已清除軌跡"; cube3d.alg = "";
        }
    }

    function executeAction(action) {
        if (action === "清除畫面 (CLEAR)") { output.value = ""; return; }
        if (action === "大小寫切換 (CAPS)") { 
            isCaps = !isCaps; 
            document.getElementById("ind-caps").innerText = "CAPS: " + (isCaps?"ON":"OFF"); 
            document.getElementById("ind-caps").style.color = isCaps ? "#0ff" : "#555";
            return; 
        }
        if (action === "電子琴模式 (MUSIC)") { 
            isMusicMode = !isMusicMode; 
            document.getElementById("ind-music").innerText = "MUSIC: " + (isMusicMode?"ON":"OFF"); 
            document.getElementById("ind-music").style.color = isMusicMode ? "#0ff" : "#555";
            return; 
        }
        if (action === "語音朗讀 (SPEAK)") {
            const msg = new SpeechSynthesisUtterance(output.value);
            msg.lang = 'zh-TW';
            window.speechSynthesis.speak(msg);
            return;
        }

        if (isMusicMode) return;

        playSound('type');
        let charToType = action;
        if (action === "[倒退鍵 (Back)]") { output.value = output.value.slice(0, -1); } 
        else if (action === "[空白鍵]") { output.value += " "; }
        else {
            if (charToType.length === 1 && charToType.match(/[A-Z]/i)) {
                charToType = isCaps ? charToType.toUpperCase() : charToType.toLowerCase();
            }
            output.value += charToType;
        }
        output.scrollTop = output.scrollHeight;
    }
</script>
</body>
</html>
