<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超級威龍 V2 AI - 創世神終極版</title>
    <script src="https://cdn.cubing.net/js/cubing/twisty" type="module"></script>
    <style>
        :root { --bg: #050505; --panel: #111; --text: #0f0; --accent: #0f0; --border: #333; }
        body.light-mode { --bg: #f8fafc; --panel: #ffffff; --text: #0f172a; --accent: #2563eb; --border: #cbd5e1; }
        
        body { background: var(--bg); color: var(--text); font-family: monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        h2 { color: var(--accent); margin-bottom: 10px; text-shadow: 0 0 10px var(--accent); letter-spacing: 2px; }
        
        .layout-container { display: flex; gap: 20px; width: 100%; max-width: 1200px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
        .panel { background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid var(--border); flex: 1; min-width: 350px; box-shadow: 0 0 15px rgba(0, 255, 0, 0.1); }
        
        button { padding: 12px 20px; font-weight: bold; background: #222; color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; margin-bottom: 15px; font-family: monospace; transition: 0.2s; }
        button:hover { background: var(--accent); color: #000; }
        
        #output { width: 100%; height: 150px; font-size: 24px; padding: 15px; background: #000; color: var(--accent); border: 1px solid var(--border); border-radius: 4px; outline: none; resize: none; font-family: monospace; box-sizing: border-box; }
        .buffer-display { margin-top: 10px; font-size: 16px; color: #ff0; height: 24px; font-weight: bold; }
        
        .cube-wrapper { display: flex; justify-content: center; align-items: center; height: 220px; background: #000; border: 1px solid var(--border); margin-bottom: 15px; border-radius: 4px; }
        twisty-player { width: 100%; height: 100%; }
        
        .sys-cmd-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 12px; background: #000; padding: 15px; border: 1px dashed var(--border); }
        .sys-cmd-list span { color: #f0f; font-weight: bold; }
        
        /* 狀態列 */
        .status-indicators { display: flex; justify-content: space-between; margin-top: 10px; font-size: 14px; color: #555; font-weight: bold; }
        .status-indicators .active { color: #0ff; text-shadow: 0 0 5px #0ff; }
    </style>
</head>
<body>

<h2>[超級威龍 V2 AI - 創世神系統]</h2>

<div class="layout-container">
    <div class="panel">
        <button onclick="connectCube()" id="btn-connect">>>> 初始化藍牙連線與音效模組</button>
        <div id="status" style="color:#f00; font-weight:bold; margin-bottom: 15px; text-align:center;">[系統離線] 等待物理裝置連線...</div>
        
        <div class="cube-wrapper">
            <twisty-player id="cube3d" puzzle="3x3x3" control-panel="none" background="none"></twisty-player>
        </div>

        <div style="color:var(--accent); font-weight:bold; margin-bottom:8px;">[ROOT] 實體控制覆寫指令集：</div>
        <div class="sys-cmd-list">
            <div><span>F2 B2 U2 D2</span> : 🗑️ 格式化畫面</div>
            <div><span>L2 R2 U2 D2</span> : 🔠 大小寫切換</div>
            <div><span>U2 D2 R2 L2</span> : 🌙 視覺主題切換</div>
            <div><span>B2 F2 L2 R2</span> : 🗣️ 語音廣播文字</div>
            <div><span>R2 L2 F2 B2</span> : ⏱️ 啟動生存戰</div>
            <div><span>U2 D2 F2 B2</span> : ⏭️ 遊戲換字</div>
            <div><span style="color:#0ff">L2 B2 L2 B2</span> : 🎹 電子琴模式切換</div>
            <div><span style="color:#0ff">R2 F2 R2 F2</span> : 🤖 呼叫 AI 助理</div>
        </div>
    </div>

    <div class="panel">
        <textarea id="output" spellcheck="false" placeholder="終端機就緒。等待魔術方塊輸入訊號..."></textarea>
        <div class="buffer-display" id="bufferDisplay">序列追蹤：等待中...</div>
        
        <div class="status-indicators">
            <div id="ind-caps" class="active">CAPS: ON</div>
            <div id="ind-music">MUSIC: OFF</div>
            <div id="ind-game">GAME: OFF</div>
        </div>
    </div>
</div>

<script>
    const output = document.getElementById("output");
    const bufferDisplay = document.getElementById("bufferDisplay");
    const statusDiv = document.getElementById("status");
    const cube3d = document.getElementById("cube3d");
    
    let moveBuffer = [];
    let evalTimer = null;
    let isCaps = true;
    let isMusicMode = false;
    let inGame = false;
    
    // 藍牙 UUID
    const SERVICE_UUID = '0000a0b0-0000-1000-8000-00805f9b34fb';
    const CHAR_UUID = '0000a0b1-0000-1000-8000-00805f9b34fb';
    const moveMap = { 1:"U", 2:"U'", 3:"U2", 4:"D", 5:"D'", 6:"D2", 7:"L", 8:"L'", 9:"L2", 10:"R", 11:"R'", 12:"R2", 13:"F", 14:"F'", 15:"F2", 16:"B", 17:"B'", 18:"B2" };

    // 音效合成器
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = { 'U': 261.63, 'D': 293.66, 'L': 329.63, 'R': 349.23, 'F': 392.00, 'B': 440.00 }; // C4, D4, E4, F4, G4, A4

    function playSound(type, face = null) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if (type === 'music' && face) { // 電子琴音效
            osc.type = 'sine'; osc.frequency.setValueAtTime(notes[face[0]], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'type') { // 打字聲
            osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        } else if (type === 'cmd') { // 指令聲
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime); osc.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    // A-Z 核心指令與打字公式
    const DICTIONARY = {
        "F2 B2 U2 D2": "CMD_CLEAR", "L2 R2 U2 D2": "CMD_CAPS", "U2 D2 R2 L2": "CMD_THEME",
        "B2 F2 L2 R2": "CMD_SPEAK", "R2 L2 F2 B2": "CMD_GAME", "U2 D2 F2 B2": "CMD_SKIP",
        "L2 B2 L2 B2": "CMD_MUSIC", "R2 F2 R2 F2": "CMD_AI",

  
        // 標點與控制
        "R U R' U'": ",", "R' F R F'": ".", "U R U' R'": "?", "F R' F' R": "!",
        "L' U' L U": "BACKSPACE", "U2": " ", "D2": "\n",

        // 數字 (簡單 OLL / F2L)
        "F R U R' U' F'": "1", "F U R U' R' F'": "2", "R U R' U R U2 R'": "3", "R U2 R' U' R U' R'": "4",
        "R U R' U R U' R' U R U2 R'": "5", "R2 D R' U2 R D' R' U2 R'": "6", "R U2 R2 U' R2 U' R2 U2 R": "7",
        "R U R' U' R' F R F'": "8", "R U' R'": "9", "R U R'": "0",

        // 字母 A-Z (全 PLL + 純外層變體 + 補位 OLL)
        "R' F R' B2 R F' R' B2 R2": "A", // Aa-Perm
        "R2 B2 R F R' B2 R F' R": "B",   // Ab-Perm
        "R U' R U R U R U' R' U' R2": "C", // Ua-Perm
        "R2 U R U R' U' R' U' R' U R'": "D", // Ub-Perm
        "R U' R' D R U R' D' R U R' D R U' R' D'": "E", // E-Perm
        "R' U' F' R U R' U' R' F R2 U' R' U'": "F", // F-Perm
        "R2 U R' U R' U' R U' R2 D U' R' U R D'": "G", // Ga-Perm
        "R2 U2 R U2 R2 U2 R2 U2 R U2 R2": "H", // H-Perm (純外層版)
        "R' U' R U D' R2 U R' U R U' R U' R2 D": "I", // Gb-Perm
        "R U R' F' R U R' U' R' F R2 U' R'": "J", // Jb-Perm
        "R' U L' U2 R U' R' U2 R L": "K", // Ja-Perm
        "R2 U' R U' R U R' U R2 D' U R U' R' D": "L", // Gc-Perm
        "R U R' U' D R2 U' R U' R' U R' U R2 D'": "M", // Gd-Perm
        "R U R' U R U R' F' R U R' U' R' F R2 U'": "N", // Na-Perm
        "R' U R U' R' F' U' F R U R' F R' F' R": "O", // Nb-Perm
        "R U' R' U' R U R D R' U' R D' R' U2 R'": "P", // Ra-Perm
        "R' U2 R U2 R' F R U R' U' R' F' R2 U'": "Q", // Rb-Perm
        "R U R' U' R' F R2 U' R' U' R U R' F'": "R", // T-Perm
        "F R U' R' U' R U R' F' R U R' U' R' F R F'": "S", // Y-Perm
        "R U R' U R' U' R' U R U' R' U' R2 U R": "T", // Z-Perm (純外層版)
        "R' U R' U' B' R' B2 U' R' U R' B R B": "U", // V-Perm
        "R' U' F U R U' R' F' R": "V", // L-OLL
        "R U R' U R U' R' U' R' F R F'": "W", // W-OLL
        "F R U R' U' F' U F R U R' U' F'": "X", // 兩次一字OLL
        "R U R2 U' R' F R U R U' F'": "Y", // C-OLL
        "F R U R' U' R U R' U' F'": "Z" // 兩次Sexy OLL
    };

    const sortedAlgos = Object.keys(DICTIONARY).sort((a, b) => b.length - a.length);

    async function connectCube() {
        try {
            audioCtx.resume();
            statusDiv.innerText = "[通訊建立中...]";
            const device = await navigator.bluetooth.requestDevice({ filters: [{ namePrefix: 'MoYu' }], optionalServices: [SERVICE_UUID] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const char = await service.getCharacteristic(CHAR_UUID);
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', handleCubeData);
            
            statusDiv.innerText = "[連線成功] 實體控制權已移交至魔術方塊。";
            statusDiv.style.color = "#0f0";
            document.getElementById("btn-connect").style.display = "none";
            playSound('cmd');
        } catch (err) { statusDiv.innerText = "[錯誤] 藍牙連線遭拒，請確認權限與設備狀態。"; }
    }

    function handleCubeData(e) {
        const val = new Uint8Array(e.target.value.buffer);
        const move = moveMap[val[18]];
        if (move) {
            // 如果開啟音樂模式，每個轉動都發聲
            if (isMusicMode) playSound('music', move);
            
            moveBuffer.push(move);
            cube3d.alg = moveBuffer.join(" ");
            bufferDisplay.innerText = ">> " + moveBuffer.join(" ");
            clearTimeout(evalTimer);
            evalTimer = setTimeout(evaluateBuffer, 700);
        }
    }

    function cleanSequence(seqArray) {
        let str = seqArray.join(" ");
        let prev = "";
        while (str !== prev) {
            prev = str;
            str = str.replace(/([UDLRFB])\s\1'/g, "").replace(/([UDLRFB])'\s\1(?!')/g, "").replace(/\s+/g, " ").trim();
        }
        return str.length > 0 ? str.split(" ") : [];
    }

    function evaluateBuffer() {
        moveBuffer = cleanSequence(moveBuffer);
        let bufferStr = moveBuffer.join(" ");
        let typed = false;

        // 永遠優先判定系統指令 (即使在音樂模式下也要能關閉音樂)
        for (let algo of sortedAlgos) {
            while (bufferStr.includes(algo)) {
                executeAction(DICTIONARY[algo]);
                bufferStr = bufferStr.replace(algo, "").trim().replace(/\s+/g, " ");
                typed = true;
            }
        }

        if (typed) {
            moveBuffer = bufferStr.length > 0 ? bufferStr.split(" ") : [];
            bufferDisplay.innerText = moveBuffer.length ? ">> " + moveBuffer.join(" ") : ">> [待命中]";
            setTimeout(() => { if(moveBuffer.length === 0) cube3d.alg = ""; }, 400);
        } else if (moveBuffer.length > 25) {
            moveBuffer = []; bufferDisplay.innerText = ">> [緩衝區溢位] 已清除軌跡"; cube3d.alg = "";
        }
    }

    function executeAction(action) {
        if (action.startsWith("CMD_")) {
            playSound('cmd');
            if (action === "CMD_CLEAR") { output.value = ""; }
            else if (action === "CMD_CAPS") { 
                isCaps = !isCaps; document.getElementById("ind-caps").className = isCaps ? "active" : ""; document.getElementById("ind-caps").innerText = "CAPS: " + (isCaps?"ON":"OFF");
            }
            else if (action === "CMD_THEME") { document.body.classList.toggle("light-mode"); }
            else if (action === "CMD_SPEAK") { speakText(output.value); }
            else if (action === "CMD_MUSIC") {
                isMusicMode = !isMusicMode; document.getElementById("ind-music").className = isMusicMode ? "active" : ""; document.getElementById("ind-music").innerText = "MUSIC: " + (isMusicMode?"ON":"OFF");
            }
            else if (action === "CMD_AI") { triggerAI(); }
            return;
        }

        // 若為音樂模式，不進行一般字母輸入
        if (isMusicMode) return;

        playSound('type');
        let charToType = action;
        if (action === "BACKSPACE") { output.value = output.value.slice(0, -1); } 
        else {
            if (charToType.length === 1 && charToType.match(/[A-Z]/i)) charToType = isCaps ? charToType.toUpperCase() : charToType.toLowerCase();
            output.value += charToType;
        }
        output.scrollTop = output.scrollHeight;
    }

    function speakText(text) {
        if (!text) return;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-TW';
        window.speechSynthesis.speak(msg);
    }

    function triggerAI() {
        let text = output.value.trim().toUpperCase();
        let reply = "指令無法辨識。我是超級威龍 AI 系統，請輸入 HI 或 CUBE 來測試。";
        
        if (text.includes("HI") || text.includes("HELLO")) reply = "你好，玩家！你的雙手終於不用碰鍵盤了。";
        else if (text.includes("CUBE")) reply = "魔術方塊是世界上最棒的介面！";
        else if (text.includes("CODE")) reply = "程式碼執行完畢。";
        else if (text.length > 0) reply = "我收到你的訊息了：" + text;

        output.value += `\n\n[AI回覆] ${reply}\n>> `;
        output.scrollTop = output.scrollHeight;
        speakText(reply);
    }
</script>
</body>
</html>
